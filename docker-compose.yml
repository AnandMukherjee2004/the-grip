services:
  postgres:
    image: postgres:16
    container_name: grip_postgres
    environment:
      POSTGRES_USER: grip
      POSTGRES_PASSWORD: grip_local
      POSTGRES_DB: grip_dev
    ports:
      - "5433:5432"
    volumes:
      - grip_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: grip_redis
    ports:
      - "6379:6379"
    volumes:
      - grip_redis_data:/data

volumes:
  grip_postgres_data:
  grip_redis_data:
