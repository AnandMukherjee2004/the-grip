services:
  - type: web
    name: grip-python-worker
    runtime: python
    rootDir: workers
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: CREDENTIALS_ENCRYPTION_KEY
        sync: false
      - key: WORKER_SECRET
        sync: false